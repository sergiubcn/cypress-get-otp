name: Run Cypress tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run cy:run
